<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS Board — Interactive Prototype</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;color:#e2e8f0;min-height:100vh;background:#05050a;overflow-x:hidden}
  body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 20% 20%,rgba(139,92,246,.08) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(236,72,153,.06) 0%,transparent 50%);z-index:-1}

  .layout{display:grid;grid-template-columns:72px 260px 1fr 320px;min-height:100vh}

  /* Icon bar */
  .ib{background:rgba(10,10,20,.9);border-right:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:8px}
  .ib-logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#8b5cf6,#ec4899);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;margin-bottom:20px;cursor:pointer}
  .ib-i{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .2s;color:#64748b;position:relative}
  .ib-i:hover,.ib-i.active{background:rgba(139,92,246,.2);color:#a78bfa}
  .ib-i.active::before{content:'';position:absolute;left:-2px;top:50%;transform:translateY(-50%);width:4px;height:20px;border-radius:0 4px 4px 0;background:#8b5cf6}
  .ib-dot{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;background:#ef4444;border:2px solid #05050a}

  /* Left panel */
  .lp{background:rgba(10,10,20,.6);border-right:1px solid rgba(255,255,255,.05);padding:24px 16px;overflow-y:auto}
  .lp-t{font-size:13px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;padding:0 8px}
  .lp-i{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:14px;color:#94a3b8;cursor:pointer;transition:all .2s;margin-bottom:2px}
  .lp-i:hover{background:rgba(139,92,246,.1);color:#e2e8f0}
  .lp-i.active{background:rgba(139,92,246,.15);color:#a78bfa;font-weight:600}
  .lp-b{margin-left:auto;font-size:11px;font-weight:700;background:rgba(239,68,68,.2);color:#f87171;padding:2px 8px;border-radius:8px}
  .lp-d{height:1px;background:rgba(255,255,255,.05);margin:16px 0}
  .wr-btn{width:100%;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s;margin-top:16px}
  .wr-btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(139,92,246,.4)}

  /* Main */
  .mn{overflow-y:auto;position:relative}
  .mn-h{position:sticky;top:0;z-index:10;background:rgba(5,5,10,.8);backdrop-filter:blur(20px);padding:20px 28px 0;border-bottom:1px solid rgba(255,255,255,.05)}
  .mn-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .mn-title{font-size:26px;font-weight:900;background:linear-gradient(90deg,#e2e8f0,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .tabs{display:flex;gap:4px}
  .tab{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;transition:all .2s}
  .tab.active{background:rgba(139,92,246,.15);color:#a78bfa}
  .tab:hover:not(.active){color:#e2e8f0}
  .cats{display:flex;gap:8px;padding:16px 28px}
  .cp{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,.08);color:#64748b;cursor:pointer;transition:all .2s;background:none}
  .cp.active{background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;border-color:transparent;box-shadow:0 2px 12px rgba(99,102,241,.3)}

  /* Post card */
  .feed{padding:0 28px 28px;display:flex;flex-direction:column;gap:12px}
  .post{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;transition:all .3s;cursor:pointer}
  .post:hover{background:rgba(139,92,246,.05);border-color:rgba(139,92,246,.15);transform:translateY(-1px)}
  .ph{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .pa{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;color:#fff}
  .pa1{background:linear-gradient(135deg,#f87171,#ef4444)}.pa2{background:linear-gradient(135deg,#fbbf24,#f59e0b)}.pa3{background:linear-gradient(135deg,#34d399,#10b981)}.pa4{background:linear-gradient(135deg,#60a5fa,#3b82f6)}
  .pm{flex:1}.pm-n{font-size:14px;font-weight:700}.pm-t{font-size:12px;color:#475569}
  .pc{font-size:11px;font-weight:700;padding:4px 12px;border-radius:8px}
  .pc-f{background:rgba(139,92,246,.15);color:#a78bfa}.pc-q{background:rgba(251,191,36,.15);color:#fbbf24}.pc-i{background:rgba(52,211,153,.15);color:#34d399}
  .hot{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:800;color:#f87171;background:rgba(248,113,113,.1);padding:4px 10px;border-radius:8px;margin-left:6px;animation:glow 2s infinite}
  @keyframes glow{0%,100%{box-shadow:0 0 8px rgba(248,113,113,.3)}50%{box-shadow:0 0 16px rgba(248,113,113,.5)}}
  .pt{font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:6px}.pb{font-size:14px;color:#8892b0;line-height:1.6;margin-bottom:16px}
  .pf{display:flex;gap:4px}
  .pf-b{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;font-size:13px;font-weight:500;color:#64748b;border:none;background:rgba(255,255,255,.03);cursor:pointer;transition:all .2s}
  .pf-b:hover{background:rgba(139,92,246,.1);color:#a78bfa}
  .pf-b.liked{color:#f87171;background:rgba(248,113,113,.1)}

  /* Right */
  .rt{background:rgba(10,10,20,.6);border-left:1px solid rgba(255,255,255,.05);padding:24px 20px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .rc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;margin-bottom:16px}
  .rc-t{font-size:15px;font-weight:800;margin-bottom:16px}
  .tri{display:flex;align-items:baseline;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
  .tri:last-child{border:none}
  .tr-r{font-size:16px;font-weight:900;color:#8b5cf6;min-width:20px}
  .tr-tx{font-size:14px;font-weight:600}.tr-s{font-size:11px;color:#64748b;margin-top:2px}
  .sg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .sg-i{text-align:center;padding:12px;background:rgba(255,255,255,.03);border-radius:12px}
  .sg-v{font-size:24px;font-weight:900;background:linear-gradient(135deg,#a78bfa,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .sg-l{font-size:11px;color:#64748b;margin-top:4px}

  /* Modal overlay */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center}
  .overlay.show{display:flex}
  .modal{background:#12121e;border:1px solid rgba(255,255,255,.1);border-radius:20px;width:90%;max-width:600px;max-height:90vh;overflow-y:auto;animation:modalIn .3s}
  @keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
  .modal-h{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.06)}
  .modal-h h2{font-size:18px;font-weight:800}
  .modal-close{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.05);color:#e2e8f0;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .modal-close:hover{background:rgba(255,255,255,.1)}
  .modal-body{padding:24px}
  .form-group{margin-bottom:20px}
  .form-label{display:block;font-size:13px;font-weight:600;color:#94a3b8;margin-bottom:8px}
  .form-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;font-family:inherit;transition:border-color .2s}
  .form-input:focus{border-color:#8b5cf6}
  textarea.form-input{min-height:120px;resize:vertical}
  .cat-select{display:flex;gap:8px}
  .cat-opt{padding:8px 18px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,.08);color:#64748b;cursor:pointer;transition:all .2s;background:none}
  .cat-opt.selected{background:rgba(139,92,246,.15);color:#a78bfa;border-color:#8b5cf6}
  .submit-btn{width:100%;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s}
  .submit-btn:hover{box-shadow:0 8px 30px rgba(139,92,246,.4)}

  /* Detail view */
  .detail-view{display:none}
  .detail-view.show{display:block}
  .feed-view.hide{display:none}
  .back-btn{display:flex;align-items:center;gap:8px;padding:12px 28px;font-size:14px;font-weight:600;color:#a78bfa;cursor:pointer;border:none;background:none}
  .back-btn:hover{color:#e2e8f0}
  .detail-post{padding:0 28px 20px}
  .dp-title{font-size:22px;font-weight:800;margin-bottom:8px}
  .dp-body{font-size:15px;color:#8892b0;line-height:1.8;margin-bottom:20px}
  .comments-section{padding:0 28px 28px}
  .cs-title{font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06)}
  .comment{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04)}
  .c-avatar{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;color:#fff}
  .c-body{flex:1}
  .c-name{font-size:13px;font-weight:700;margin-bottom:4px}
  .c-text{font-size:14px;color:#8892b0;line-height:1.5}
  .c-actions{display:flex;gap:12px;margin-top:8px}
  .c-act{font-size:12px;color:#64748b;cursor:pointer}
  .c-act:hover{color:#a78bfa}
  .comment-input{display:flex;gap:12px;margin-top:16px}
  .comment-input input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none}
  .comment-input input:focus{border-color:#8b5cf6}
  .comment-input button{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:#fff;border:none;border-radius:12px;padding:12px 20px;font-weight:700;cursor:pointer}

  /* Report modal */
  .report-opts{display:flex;flex-direction:column;gap:8px}
  .report-opt{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.08);cursor:pointer;transition:all .2s;background:none;color:#e2e8f0;font-size:14px;width:100%;text-align:left}
  .report-opt:hover{border-color:#8b5cf6;background:rgba(139,92,246,.05)}
  .report-opt.selected{border-color:#8b5cf6;background:rgba(139,92,246,.1)}

  /* Toast */
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid rgba(139,92,246,.3);color:#e2e8f0;padding:14px 24px;border-radius:14px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .toast.show{opacity:1}

  @media(max-width:1200px){.layout{grid-template-columns:72px 1fr 320px}.lp{display:none}}
  @media(max-width:900px){.layout{grid-template-columns:1fr}.ib,.rt{display:none}}
</style>
</head>
<body>
<div class="layout">
  <nav class="ib">
    <div class="ib-logo" onclick="goHome()">B</div>
    <div class="ib-i active" data-nav="feed" onclick="switchNav(this,'feed')">🏠</div>
    <div class="ib-i" data-nav="hot" onclick="switchNav(this,'hot')">🔥<div class="ib-dot"></div></div>
    <div class="ib-i" data-nav="notif" onclick="switchNav(this,'notif')">🔔</div>
    <div class="ib-i" data-nav="my" onclick="switchNav(this,'my')">📝</div>
    <div class="ib-i" style="margin-top:auto" onclick="showToast('설정 페이지는 준비 중입니다')">⚙️</div>
  </nav>

  <aside class="lp">
    <div class="lp-t">카테고리</div>
    <div class="lp-i active" onclick="filterCat(this,'all')">🌐 전체 <span class="lp-b">52</span></div>
    <div class="lp-i" onclick="filterCat(this,'free')">💬 자유 <span class="lp-b">28</span></div>
    <div class="lp-i" onclick="filterCat(this,'question')">❓ 질문 <span class="lp-b">15</span></div>
    <div class="lp-i" onclick="filterCat(this,'info')">ℹ️ 정보 <span class="lp-b">9</span></div>
    <div class="lp-d"></div>
    <div class="lp-t">바로가기</div>
    <div class="lp-i" onclick="showToast('내 글 목록')">📌 내 글</div>
    <div class="lp-i" onclick="showToast('공감한 글 목록')">❤️ 공감한 글</div>
    <button class="wr-btn" onclick="openWriteModal()">✨ 새 글 작성</button>
  </aside>

  <main class="mn">
    <div class="mn-h">
      <div class="mn-top"><div class="mn-title" id="mainTitle">피드</div></div>
      <div class="tabs">
        <div class="tab active" onclick="switchTab(this,'latest')">🕐 최신</div>
        <div class="tab" onclick="switchTab(this,'popular')">🔥 인기</div>
      </div>
    </div>

    <div class="feed-view" id="feedView">
      <div class="cats">
        <button class="cp active" onclick="filterCatPill(this,'all')">전체</button>
        <button class="cp" onclick="filterCatPill(this,'free')">💬 자유</button>
        <button class="cp" onclick="filterCatPill(this,'question')">❓ 질문</button>
        <button class="cp" onclick="filterCatPill(this,'info')">ℹ️ 정보</button>
      </div>
      <div class="feed" id="feedList"></div>
    </div>

    <div class="detail-view" id="detailView">
      <button class="back-btn" onclick="goBack()">← 목록으로</button>
      <div id="detailContent"></div>
    </div>
  </main>

  <aside class="rt">
    <div class="rc">
      <div class="rc-t">🔥 실시간 인기</div>
      <div class="tri"><span class="tr-r">1</span><div><div class="tr-tx">구내식당 메뉴 개선</div><div class="tr-s">공감 24 · 댓글 8</div></div></div>
      <div class="tri"><span class="tr-r">2</span><div><div class="tr-tx">전사 타운홀 안내</div><div class="tr-s">공감 45 · 댓글 5</div></div></div>
      <div class="tri"><span class="tr-r">3</span><div><div class="tr-tx">맛집 추천 스레드</div><div class="tr-s">공감 15 · 댓글 21</div></div></div>
    </div>
    <div class="rc">
      <div class="rc-t">📊 오늘의 보드</div>
      <div class="sg">
        <div class="sg-i"><div class="sg-v">18</div><div class="sg-l">오늘 글</div></div>
        <div class="sg-i"><div class="sg-v">47</div><div class="sg-l">오늘 댓글</div></div>
        <div class="sg-i"><div class="sg-v">83</div><div class="sg-l">활성 사용자</div></div>
        <div class="sg-i"><div class="sg-v">1.2K</div><div class="sg-l">총 게시글</div></div>
      </div>
    </div>
  </aside>
</div>

<!-- Write Modal -->
<div class="overlay" id="writeModal">
  <div class="modal">
    <div class="modal-h"><h2>✨ 새 글 작성</h2><button class="modal-close" onclick="closeModal('writeModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">카테고리</label>
        <div class="cat-select">
          <div class="cat-opt selected" onclick="selectCat(this,'free')">💬 자유</div>
          <div class="cat-opt" onclick="selectCat(this,'question')">❓ 질문</div>
          <div class="cat-opt" onclick="selectCat(this,'info')">ℹ️ 정보</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">제목</label>
        <input class="form-input" id="writeTitle" placeholder="제목을 입력하세요">
      </div>
      <div class="form-group">
        <label class="form-label">내용</label>
        <textarea class="form-input" id="writeContent" placeholder="본문을 입력하세요..."></textarea>
      </div>
      <button class="submit-btn" onclick="submitPost()">게시하기</button>
    </div>
  </div>
</div>

<!-- Report Modal -->
<div class="overlay" id="reportModal">
  <div class="modal" style="max-width:440px">
    <div class="modal-h"><h2>⚑ 신고하기</h2><button class="modal-close" onclick="closeModal('reportModal')">✕</button></div>
    <div class="modal-body">
      <div class="report-opts">
        <button class="report-opt" onclick="selectReport(this)">🤬 욕설/비방</button>
        <button class="report-opt" onclick="selectReport(this)">📢 스팸/광고</button>
        <button class="report-opt" onclick="selectReport(this)">⚠️ 부적절한 콘텐츠</button>
        <button class="report-opt" onclick="selectReport(this)">🔒 개인정보 노출</button>
        <button class="report-opt" onclick="selectReport(this)">📋 기타</button>
      </div>
      <button class="submit-btn" style="margin-top:20px" onclick="submitReport()">신고 접수</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const posts = [
  {id:1,cat:'free',catLabel:'자유',catClass:'pc-f',avatar:'pa1',title:'구내식당 메뉴 개선 건의합니다',body:'매일 같은 메뉴가 반복되는 것 같아서요. 다양한 메뉴 옵션이 있으면 좋겠습니다. 특히 채식 옵션이 추가되면 좋겠어요. 주변 회사들은 다 메뉴가 다양하던데 우리도 개선해주시면 좋겠습니다.',time:'5분 전',likes:24,comments:[{text:'저도 동의합니다! 특히 월요일 메뉴가...',likes:5},{text:'채식 옵션 강력 찬성이요',likes:3},{text:'담당 부서에 건의해볼게요',likes:8}],liked:true,hot:true,views:142},
  {id:2,cat:'question',catLabel:'질문',catClass:'pc-q',avatar:'pa2',title:'연차 신청 시스템 어디서 하나요?',body:'입사한지 얼마 안 돼서 잘 모르겠는데, 연차 신청을 어느 시스템에서 해야 하나요? HR 포탈인가요 아니면 별도 앱이 있나요? 선배분들 알려주세요!',time:'23분 전',likes:3,comments:[{text:'HR 포탈 > 근태관리 > 연차신청 메뉴에 있어요',likes:12},{text:'모바일앱에서도 되더라고요!',likes:4}],liked:false,hot:false,views:89},
  {id:3,cat:'info',catLabel:'정보',catClass:'pc-i',avatar:'pa3',title:'이번 주 금요일 전사 타운홀 안내',body:'이번 주 금요일 오후 3시에 대강당에서 전사 타운홀 미팅이 있습니다. 참석 필수이니 일정 확인해주세요. 간식도 준비된다고 합니다! 기대되네요.',time:'1시간 전',likes:45,comments:[{text:'간식 뭔지 아시는 분?',likes:7},{text:'피자라는 소문이...',likes:15}],liked:true,hot:true,views:320},
  {id:4,cat:'free',catLabel:'자유',catClass:'pc-f',avatar:'pa4',title:'회사 근처 맛집 추천해주세요 🍜',body:'점심시간에 갈 만한 괜찮은 식당 있을까요? 한식 위주로 추천 부탁드립니다. 가성비 좋은 곳이면 더 좋아요. 매일 구내식당만 가니까 지겨워요.',time:'2시간 전',likes:15,comments:[{text:'2번 출구 앞 김밥천국 강추!',likes:3},{text:'사거리 순대국밥집 맛있어요',likes:6},{text:'이탈리안 레스토랑도 괜찮더라고요',likes:2}],liked:false,hot:false,views:201}
];

let selectedCat = 'free';
let currentFilter = 'all';

function renderFeed(filter='all') {
  const list = document.getElementById('feedList');
  const filtered = filter === 'all' ? posts : posts.filter(p => p.cat === filter);
  list.innerHTML = filtered.map(p => `
    <div class="post" onclick="showDetail(${p.id})">
      <div class="ph">
        <div class="pa ${p.avatar}">👤</div>
        <div class="pm"><div class="pm-n">익명</div><div class="pm-t">${p.time}</div></div>
        <span class="pc ${p.catClass}">${p.catLabel}</span>
        ${p.hot ? '<span class="hot">🔥 HOT</span>' : ''}
      </div>
      <div class="pt">${p.title}</div>
      <div class="pb">${p.body.slice(0, 100)}...</div>
      <div class="pf">
        <button class="pf-b ${p.liked ? 'liked' : ''}" onclick="event.stopPropagation();toggleLike(${p.id})">❤️ <span id="like-${p.id}">${p.likes}</span></button>
        <button class="pf-b">💬 ${p.comments.length}</button>
        <button class="pf-b">👁 ${p.views}</button>
        <button class="pf-b" style="margin-left:auto" onclick="event.stopPropagation();openReport()">⚑</button>
      </div>
    </div>
  `).join('');
}

function showDetail(id) {
  const p = posts.find(x => x.id === id);
  document.getElementById('feedView').classList.add('hide');
  const dv = document.getElementById('detailView');
  dv.classList.add('show');
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-post">
      <div class="ph" style="margin-bottom:16px">
        <div class="pa ${p.avatar}">👤</div>
        <div class="pm"><div class="pm-n">익명</div><div class="pm-t">${p.time}</div></div>
        <span class="pc ${p.catClass}">${p.catLabel}</span>
        ${p.hot ? '<span class="hot">🔥 HOT</span>' : ''}
      </div>
      <div class="dp-title">${p.title}</div>
      <div class="dp-body">${p.body}</div>
      <div class="pf">
        <button class="pf-b ${p.liked ? 'liked' : ''}" onclick="toggleLike(${p.id})">❤️ <span id="like-${p.id}">${p.likes}</span></button>
        <button class="pf-b">💬 ${p.comments.length}</button>
        <button class="pf-b">👁 ${p.views}</button>
        <button class="pf-b" style="margin-left:auto" onclick="openReport()">⚑ 신고</button>
      </div>
    </div>
    <div class="comments-section">
      <div class="cs-title">💬 댓글 ${p.comments.length}개</div>
      ${p.comments.map((c,i) => `
        <div class="comment">
          <div class="c-avatar" style="background:linear-gradient(135deg,#6366f1,#a855f7)">👤</div>
          <div class="c-body">
            <div class="c-name">익명</div>
            <div class="c-text">${c.text}</div>
            <div class="c-actions">
              <span class="c-act" onclick="this.textContent='❤️ '+(${c.likes}+1)">❤️ ${c.likes}</span>
              <span class="c-act" onclick="openReport()">⚑ 신고</span>
            </div>
          </div>
        </div>
      `).join('')}
      <div class="comment-input">
        <input placeholder="댓글을 입력하세요..." id="commentInput">
        <button onclick="addComment(${p.id})">등록</button>
      </div>
    </div>
  `;
}

function goBack() {
  document.getElementById('feedView').classList.remove('hide');
  document.getElementById('detailView').classList.remove('show');
}
function goHome() { goBack(); }

function toggleLike(id) {
  const p = posts.find(x => x.id === id);
  p.liked = !p.liked;
  p.likes += p.liked ? 1 : -1;
  const el = document.getElementById('like-'+id);
  if(el) el.textContent = p.likes;
  const btn = el?.parentElement;
  if(btn) { btn.classList.toggle('liked', p.liked); }
  showToast(p.liked ? '공감했습니다 ❤️' : '공감을 취소했습니다');
}

function addComment(id) {
  const input = document.getElementById('commentInput');
  if(!input.value.trim()) return;
  const p = posts.find(x => x.id === id);
  p.comments.push({text: input.value, likes: 0});
  showToast('댓글이 등록되었습니다 💬');
  showDetail(id);
}

function openWriteModal() { document.getElementById('writeModal').classList.add('show'); }
function openReport() { document.getElementById('reportModal').classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function selectCat(el, cat) {
  selectedCat = cat;
  el.parentElement.querySelectorAll('.cat-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

function submitPost() {
  const title = document.getElementById('writeTitle').value;
  const content = document.getElementById('writeContent').value;
  if(!title.trim() || !content.trim()) { showToast('제목과 내용을 입력해주세요'); return; }
  const catMap = {free:{label:'자유',cls:'pc-f'},question:{label:'질문',cls:'pc-q'},info:{label:'정보',cls:'pc-i'}};
  const avatars = ['pa1','pa2','pa3','pa4'];
  posts.unshift({id:Date.now(),cat:selectedCat,catLabel:catMap[selectedCat].label,catClass:catMap[selectedCat].cls,avatar:avatars[Math.floor(Math.random()*4)],title,body:content,time:'방금 전',likes:0,comments:[],liked:false,hot:false,views:0});
  closeModal('writeModal');
  document.getElementById('writeTitle').value = '';
  document.getElementById('writeContent').value = '';
  renderFeed(currentFilter);
  showToast('게시글이 등록되었습니다 ✨');
}

function selectReport(el) {
  el.parentElement.querySelectorAll('.report-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}
function submitReport() {
  closeModal('reportModal');
  showToast('신고가 접수되었습니다. 검토 후 처리됩니다.');
}

function switchTab(el, type) {
  el.parentElement.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  showToast(type === 'popular' ? '인기글 정렬로 전환' : '최신글 정렬로 전환');
}

function filterCat(el, cat) {
  el.parentElement.querySelectorAll('.lp-i').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  currentFilter = cat;
  renderFeed(cat);
}
function filterCatPill(el, cat) {
  el.parentElement.querySelectorAll('.cp').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  currentFilter = cat;
  renderFeed(cat);
}

function switchNav(el, nav) {
  document.querySelectorAll('.ib-i').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  if(nav === 'feed') goBack();
  else showToast(nav + ' 페이지는 준비 중입니다');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// Click outside modal to close
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if(e.target === o) o.classList.remove('show'); });
});

renderFeed();
</script>
</body>
</html>
